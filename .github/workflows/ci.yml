name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Dummy values: CI never talks to a real Supabase project. The build only
  # needs the env schema to parse.
  NEXT_PUBLIC_SUPABASE_URL: https://ci-dummy.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key-0000000000
  SUPABASE_ENV: dev

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
